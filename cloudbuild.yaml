steps:
  # 1. Artifact Registry への Docker 認証設定
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet'

  # 2. コンテナイメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/my-app/my-app:$COMMIT_SHA'
      - '.'

  # 3. Artifact Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/my-app/my-app:$COMMIT_SHA'

  # 4. Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'my-service'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/my-app/my-app:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/my-app/my-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
